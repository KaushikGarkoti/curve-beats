<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Curve Beats — MIDI Trajectory</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a1e;
      overflow: hidden;
      font-family: ui-sans-serif, system-ui, sans-serif;
    }
    #canvas-container { width: 100vw; height: 100vh; }
    /**
     * Fixed header stack: primary controls stay on row 1; many MIDI tracks scroll in row 2.
     */
    #app-chrome {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      pointer-events: none;
    }
    #app-chrome > * { pointer-events: auto; }

    #chrome {
      padding: 12px 20px 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: linear-gradient(180deg, rgba(15,15,18,0.92) 0%, rgba(15,15,18,0.4) 100%);
    }
    .chrome-row-primary {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      row-gap: 10px;
    }
    .chrome-row-tracks {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      width: 100%;
      min-width: 0;
    }
    #chrome h1 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: #e8e6e3;
      margin-right: 8px;
    }
    .btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.08);
      color: #f0f0f0;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn:hover:not(:disabled) {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.28);
    }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-primary {
      background: linear-gradient(135deg, #3d7cff 0%, #7c5cff 100%);
      border-color: transparent;
    }
    .btn-primary:hover:not(:disabled) {
      filter: brightness(1.08);
    }
    #file-label { cursor: pointer; }
    #midi-file, #path-ref-file { position: absolute; width: 0; height: 0; opacity: 0; pointer-events: none; }
    #status {
      font-size: 12px;
      color: #9a9690;
      max-width: 320px;
    }
    #status.ready { color: #7dffb3; }
    #status.err { color: #ff8a8a; }
    .chrome-label {
      font-size: 12px;
      color: #9a9690;
      margin-right: -4px;
    }
    #track-picker-scroll {
      flex: 1;
      min-width: 0;
      max-height: min(28vh, 200px);
      overflow-y: auto;
      overflow-x: hidden;
      padding: 6px 8px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(0,0,0,0.22);
      scrollbar-gutter: stable;
    }
    #track-picker-scroll::-webkit-scrollbar {
      width: 8px;
    }
    #track-picker-scroll::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.22);
      border-radius: 4px;
    }
    #track-picker-scroll::-webkit-scrollbar-track {
      background: rgba(0,0,0,0.15);
      border-radius: 4px;
    }
    #track-picker {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-wrap: wrap;
      gap: 6px 14px;
      align-items: center;
      align-content: flex-start;
    }
    .track-pick-item {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: #c8c4bc;
      cursor: pointer;
      user-select: none;
    }
    .track-pick-item input {
      width: 14px;
      height: 14px;
      accent-color: #88aeff;
      cursor: pointer;
    }
    .btn-compact {
      padding: 4px 10px;
      font-size: 12px;
      min-width: 2.25rem;
    }
    #btn-tracks-all {
      flex-shrink: 0;
      align-self: flex-start;
      margin-top: 4px;
    }
    #midi-select {
      font-size: 12px;
      color: #e8e6e3;
      background: #28282f;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 6px;
      padding: 6px 10px;
      cursor: pointer;
      color-scheme: dark;
      max-width: min(220px, 42vw);
    }
    #midi-select:focus {
      outline: 2px solid rgba(90,140,255,0.45);
      outline-offset: 1px;
    }
    .transport-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    #seek-bar {
      width: min(220px, 28vw);
      min-width: 80px;
      accent-color: #7c5cff;
      cursor: pointer;
    }
    #seek-bar:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .seek-time {
      font-size: 12px;
      color: #9a9690;
      font-variant-numeric: tabular-nums;
      min-width: 9.5rem;
    }
    /* ── Instrument panel (flows under #chrome inside #app-chrome) ─ */
    #instrument-panel {
      position: relative;
      left: 0; right: 0;
      padding: 0 20px 10px;
      background: linear-gradient(180deg, rgba(15,15,18,0.88) 0%, rgba(15,15,18,0.0) 100%);
      display: none;
      flex-wrap: wrap;
      gap: 8px 20px;
      align-items: center;
    }
    #instrument-panel.visible { display: flex; }
    .inst-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .inst-track-label {
      font-size: 11px;
      color: #9a9690;
      white-space: nowrap;
      max-width: 130px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .inst-select {
      font-size: 12px;
      color: #e8e6e3;
      background: #28282f;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 6px;
      padding: 4px 8px;
      cursor: pointer;
      color-scheme: dark;
      appearance: auto;
    }
    .inst-select:hover { border-color: rgba(255,255,255,0.3); }
    .inst-select:focus { outline: 2px solid rgba(90,140,255,0.45); outline-offset: 1px; }
    #hud {
      position: fixed;
      bottom: 16px;
      left: 16px;
      color: #c8c4bc;
      font-size: 12px;
      line-height: 1.8;
      font-variant-numeric: tabular-nums;
      pointer-events: none;
      z-index: 5;
    }
    #hud span { display: inline-block; min-width: 72px; color: #fff; }
  </style>
</head>
<body>
  <div id="app-chrome">
    <div id="chrome">
      <div class="chrome-row-primary">
        <h1>Curve Beats</h1>
        <input type="file" id="midi-file" accept=".mid,.midi,audio/midi" />
        <input type="file" id="path-ref-file" accept=".json,application/json" />
        <label for="midi-file" class="btn" id="file-label">Upload MIDI</label>
        <label class="chrome-label" for="midi-select">Bundled</label>
        <select id="midi-select" aria-label="Bundled MIDI from public/midis" title="JSON exports served from /midis/">
          <option value="">Loading…</option>
        </select>
        <div class="transport-row">
          <button type="button" class="btn btn-compact" id="btn-seek-back" title="Back 5 seconds" disabled>«</button>
          <input type="range" id="seek-bar" min="0" max="1" step="0.05" value="0" disabled aria-label="Playback position" />
          <button type="button" class="btn btn-compact" id="btn-seek-fwd" title="Forward 5 seconds" disabled>»</button>
          <span id="seek-time" class="seek-time">0:00.0 / 0:00.0</span>
        </div>
        <button type="button" class="btn btn-primary" id="btn-play" disabled>Play</button>
        <button type="button" class="btn" id="btn-pause" disabled>Pause</button>
        <button type="button" class="btn" id="btn-stop" disabled>Stop</button>
        <p id="status">Loading default MIDI…</p>
      </div>
      <div class="chrome-row-tracks">
        <span class="chrome-label" style="padding-top: 6px;">Include</span>
        <div id="track-picker-scroll">
          <div id="track-picker" aria-label="Pitched tracks to include in path and mix"></div>
        </div>
        <button type="button" class="btn btn-compact" id="btn-tracks-all" title="Include all pitched tracks" disabled>All</button>
      </div>
    </div>
    <div id="instrument-panel" aria-label="Per-track instrument assignment"></div>
  </div>
  <div id="canvas-container"></div>
  <div id="hud">
    <div>t (Transport): <span id="hud-t">0.000</span></div>
    <div>beat: <span id="hud-beat">—</span></div>
    <div>platforms: <span id="hud-plat">0</span></div>
    <div>path vs ref: <span id="hud-path-diff">—</span></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
